name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    tags: ["v*"]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: gen-pass-ts/package-lock.json

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: jetli/wasm-pack@v0.4.0

      - name: Build site
        run: chmod +x build.sh && ./build.sh

      - name: Stage Pages artifact
        run: |
          mkdir -p _site
          cp index.html _site/
          cp -R dist pkg _site/
          echo "hashkit.net" > _site/CNAME
          touch _site/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
