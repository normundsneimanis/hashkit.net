name: Deploy to GitHub Pages

on:
  push:
    tags: ["v*"]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: gen-pass-ts/package-lock.json

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install zig
        run: |
          ZIG_VERSION=0.16.0
          curl -LO "https://ziglang.org/download/${ZIG_VERSION}/zig-x86_64-linux-${ZIG_VERSION}.tar.xz"
          tar -xf "zig-x86_64-linux-${ZIG_VERSION}.tar.xz"
          echo "$(pwd)/zig-x86_64-linux-${ZIG_VERSION}" >> "$GITHUB_PATH"
          "$(pwd)/zig-x86_64-linux-${ZIG_VERSION}/zig" version

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Build site
        run: chmod +x build.sh && ./build.sh

      - name: Stage Pages artifact
        run: |
          mkdir -p _site
          cp index.html _site/
          cp -R dist pkg _site/
          echo "hashkit.net" > _site/CNAME
          touch _site/.nojekyll

      - uses: actions/upload-pages-artifact@v5
        with:
          path: _site
          include-hidden-files: true

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v5
        id: deployment
